<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全員一致ゲーム</title>
    <style>
        body { font-family: sans-serif; background: #fdfde3; margin: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; background: #f0f8ff; min-height: 100vh; position: relative; }
        .header { background: #6a0dad; color: white; padding: 15px; font-weight: bold; text-align: center; }
        .hidden { display: none !important; }
        
        button { border-radius: 30px; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 85%; margin: 10px auto; display: block; }
        .btn-pink { background: #ff6699; color: white; }
        .btn-yellow { background: #f9d71c; color: #333; }
        .btn-white { background: white; border: 2px solid #ddd; }
        .btn-exit { background: #ff4444; color: white; margin-top: 20px; }

        .config-card { background: white; border-radius: 20px; margin: 20px 15px; padding: 25px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .member-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .player-card { background: #9c9c9c; border-radius: 15px; padding: 20px 5px; text-align: center; color: white; }
        .player-card.ready { background: #7a7a7a; border: 2px solid #f9d71c; }
        
        input[type="text"] { width: 80%; padding: 12px; border-radius: 20px; border: 2px solid #ddd; margin-bottom: 10px; }
        .footer-input { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: white; padding: 15px 0; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header" id="header-text">全員一致ゲーム</div>

    <div id="view-lobby" class="view">
        <div style="padding: 60px 20px; text-align: center;">
            <input type="text" id="input-name" placeholder="名前">
            <input type="text" id="input-room" placeholder="部屋番号">
            <button class="btn-yellow" onclick="join()">入室する</button>
        </div>
    </div>

    <div id="view-wait-room" class="view hidden">
        <p style="text-align: center; padding-top: 20px;">待機中... 全員揃ったら開始してください</p>
        <div id="wait-member-list" class="member-grid"></div>
        <button id="host-start-btn" class="btn-pink hidden" onclick="goToSetup()">ゲームを開始する</button>
        <button class="btn-exit" onclick="leaveRoom()">退出する</button>
    </div>

    <div id="view-setup" class="view hidden">
        <div class="config-card">
            <h3>お題設定</h3>
            <input type="text" id="input-manual-q" placeholder="お題を入力">
            <button class="btn-white" onclick="setRandom()">ランダムお題</button>
        </div>
        <button class="btn-pink" onclick="startGame()">このお題で配信！</button>
        <button class="btn-white" onclick="backToWaiting()">終了（待機室へ）</button>
    </div>

    <div id="view-game" class="view hidden">
        <div style="background:white; border:2px solid #f9d71c; margin:15px; padding:20px; border-radius:15px; text-align:center; font-weight:bold;" id="current-q"></div>
        <div id="game-member-grid" class="member-grid"></div>
        <div class="footer-input">
            <div id="ans-area">
                <input type="text" id="input-ans" placeholder="答えは？">
                <button class="btn-yellow" onclick="submitAns()">送信</button>
            </div>
            <button id="open-btn" class="btn-pink hidden" onclick="openAll()">回答オープン</button>
        </div>
    </div>

    <div id="view-result" class="view hidden" style="padding:20px; text-align:center;">
        <h2>結果発表</h2>
        <div id="result-list"></div>
        <button id="next-btn" class="btn-yellow hidden" onclick="nextRound()">次の親へ</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let rid = "";
    let isHost = false;

    function show(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function join() {
        const name = document.getElementById('input-name').value;
        rid = document.getElementById('input-room').value;
        if(name && rid) socket.emit('join-room', { name, rid });
    }

    socket.on('error-msg', (msg) => alert(msg));
    socket.on('left-success', () => location.reload());

    socket.on('room-data', (data) => {
        isHost = (socket.id === data.hostId);
        document.getElementById('header-text').innerText = `部屋: ${data.rid}`;
        
        // 待機リストとゲームリスト両方を更新
        const html = data.members.map(m => `
            <div class="player-card ${m.isReady ? 'ready' : ''}">
                <div>${m.isReady ? 'Ready' : '...'}</div>
                <div style="font-size:0.8rem;">${m.name}</div>
            </div>
        `).join('');
        document.getElementById('wait-member-list').innerHTML = html;
        document.getElementById('game-member-grid').innerHTML = html;

        // ホストなら開始ボタンを表示
        if(isHost && data.status === 'waiting') document.getElementById('host-start-btn').classList.remove('hidden');
        else document.getElementById('host-start-btn').classList.add('hidden');

        // 回答オープンボタン
        const allReady = data.members.every(m => m.isReady);
        if(isHost && allReady) document.getElementById('open-btn').classList.remove('hidden');
        else document.getElementById('open-btn').classList.add('hidden');

        // 初回入室時
        if(!document.getElementById('view-lobby').classList.contains('hidden')) {
            show('view-wait-room');
        }
    });

    function goToSetup() { socket.emit('go-to-setup', { rid }); }
    socket.on('move-to-setup', () => { if(isHost) show('view-setup'); });

    function backToWaiting() { socket.emit('back-to-waiting', { rid }); }
    socket.on('move-to-waiting', () => { show('view-wait-room'); });

    function startGame() {
        const q = document.getElementById('input-manual-q').value;
        if(q) socket.emit('send-question', { rid, question: q });
    }

    socket.on('receive-question', (data) => {
        document.getElementById('current-q').innerText = `お題：${data.question}`;
        document.getElementById('ans-area').classList.remove('hidden');
        show('view-game');
    });

    function submitAns() {
        const ans = document.getElementById('input-ans').value;
        socket.emit('submit-answer', { rid, answer: ans });
        document.getElementById('ans-area').classList.add('hidden');
    }

    function openAll() { socket.emit('host-judge', { rid, isMatch: true }); }
    
    socket.on('show-result', (data) => {
        show('view-result');
        document.getElementById('result-list').innerHTML = data.results.map(r => `
            <div style="background:white; padding:10px; margin:5px; border-radius:10px; text-align:left;">
                <b>${r.name}</b>: ${r.answer}
            </div>
        `).join('');
        if(isHost) document.getElementById('next-btn').classList.remove('hidden');
    });

    function nextRound() { socket.emit('next-round', { rid }); }
    socket.on('prepare-next-round', () => {
        document.getElementById('input-ans').value = "";
        if(isHost) show('view-setup');
        else show('view-game');
    });

    function leaveRoom() { socket.emit('leave-room', { rid }); }
    function setRandom() { document.getElementById('input-manual-q').value = "おにぎりの具といえば？"; }
</script>
</body>
</html>
