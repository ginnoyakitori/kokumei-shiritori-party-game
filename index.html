<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>全員一致ゲーム</title>
<script src="/socket.io/socket.io.js"></script>

<style>

body{
font-family:sans-serif;
background:#f2f6ff;
text-align:center;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
}

.hidden{
display:none;
}

.card{
background:white;
padding:10px;
margin:10px;
border-radius:10px;
}

</style>
</head>

<body>

<h1>全員一致ゲーム</h1>

<div id="lobby">

<input id="name" placeholder="名前"><br>
<input id="room" placeholder="部屋番号"><br>

<button onclick="join()">入室</button>

</div>

<div id="roomView" class="hidden">

<h2 id="roomTitle"></h2>

<div id="members"></div>

<div id="hostPanel" class="hidden">

<input id="question" placeholder="お題">

<button onclick="start()">開始</button>

</div>

<button onclick="leave()">退出</button>

</div>

<div id="gameView" class="hidden">

<h2 id="q"></h2>

<input id="answer" placeholder="答え">

<button onclick="submit()">送信</button>

</div>

<div id="resultView" class="hidden">

<h2>結果</h2>

<div id="results"></div>

<button onclick="next()">次ラウンド</button>

</div>

<script>

const socket=io();

let rid="";
let userId=localStorage.getItem("uid");

if(!userId){

userId="u"+Math.random().toString(36).slice(2);

localStorage.setItem("uid",userId);

}

function join(){

const name=document.getElementById("name").value;

rid=document.getElementById("room").value;

socket.emit("join-room",{rid,name,userId});

document.getElementById("lobby").classList.add("hidden");

document.getElementById("roomView").classList.remove("hidden");

document.getElementById("roomTitle").innerText="部屋 "+rid;

}

socket.on("room-data",(data)=>{

const list=data.members.map(m=>`

<div class="card">

${m.name}

${m.isHost?"(担当)":""}

${m.online?"":"(離脱)"}

</div>

`).join("");

document.getElementById("members").innerHTML=list;

if(data.hostId===userId && data.status==="waiting"){

document.getElementById("hostPanel").classList.remove("hidden");

}else{

document.getElementById("hostPanel").classList.add("hidden");

}

});

function start(){

const q=document.getElementById("question").value;

socket.emit("start-game",{rid,question:q});

}

socket.on("game-start",(data)=>{

document.getElementById("roomView").classList.add("hidden");

document.getElementById("gameView").classList.remove("hidden");

document.getElementById("q").innerText=data.question;

});

function submit(){

const ans=document.getElementById("answer").value;

socket.emit("submit-answer",{rid,userId,answer:ans});

}

socket.on("show-result",(data)=>{

document.getElementById("gameView").classList.add("hidden");

document.getElementById("resultView").classList.remove("hidden");

document.getElementById("results").innerHTML=data.results.map(r=>`

<div class="card">

${r.name}: ${r.answer}

</div>

`).join("");

});

function next(){

socket.emit("next-round",{rid});

document.getElementById("resultView").classList.add("hidden");

document.getElementById("roomView").classList.remove("hidden");

}

function leave(){

socket.emit("leave-room",{rid,userId});

location.reload();

}

</script>

</body>
</html>
