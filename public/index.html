<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全員一致ゲーム - 大人数対応版</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: #fdfde3;
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: #f0f8ff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        .header {
            background: #6a0dad;
            color: white;
            padding: 15px;
            font-weight: bold;
            text-align: center;
            font-size: 1.5rem;
            border-bottom: 3px solid #4a0080;
        }

        .connection-status {
            padding: 10px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
            transition: background-color 0.3s ease;
        }

        .connection-status.connected {
            background: #d4edda;
            color: #155724;
        }

        .connection-status.disconnected {
            background: #f8d7da;
            color: #721c24;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        .connection-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        .connection-status.connected .connection-indicator {
            background: #28a745;
        }

        .connection-status.disconnected .connection-indicator {
            background: #dc3545;
        }

        .hidden {
            display: none !important;
        }

        .view {
            min-height: calc(100vh - 200px);
            padding-bottom: 120px;
        }

        button {
            border-radius: 30px;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            width: 85%;
            margin: 10px auto;
            display: block;
            transition: all 0.2s;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        button:hover:not([disabled]) {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        button:active:not([disabled]) {
            opacity: 0.85;
            transform: translateY(0);
        }

        button[disabled] {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .btn-pink {
            background: #ff6699;
            color: white;
            box-shadow: 0 4px 0 #d64577;
        }

        .btn-pink:active:not([disabled]) {
            box-shadow: 0 2px 0 #d64577;
        }

        .btn-yellow {
            background: #f9d71c;
            color: #333;
            box-shadow: 0 4px 0 #d4b612;
        }

        .btn-yellow:active:not([disabled]) {
            box-shadow: 0 2px 0 #d4b612;
        }

        .btn-white {
            background: white;
            color: #666;
            border: 2px solid #ccc;
            box-shadow: none;
        }

        .btn-white:hover:not([disabled]) {
            border-color: #999;
        }

        .btn-exit {
            background: #ff4444;
            color: white;
            margin-top: 20px;
            box-shadow: 0 4px 0 #cc0000;
        }

        .btn-exit:active:not([disabled]) {
            box-shadow: 0 2px 0 #cc0000;
        }

        .ready-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .wait-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            color: #333;
            font-weight: bold;
            word-break: break-word;
            transition: background-color 0.2s;
        }

        .wait-card:hover {
            background: #f9f9f9;
        }

        .host-badge {
            background: #6a0dad;
            color: white;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            margin-left: auto;
            flex-shrink: 0;
        }

        .offline {
            opacity: 0.5;
            background: #f0f0f0;
        }

        .offline small {
            color: #999;
        }

        .player-card {
            background: #7a7a7a;
            border: 2px solid #f9d71c;
            border-radius: 15px;
            padding: 12px;
            display: flex;
            align-items: center;
            color: white;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .order-badge {
            background: #f9d71c;
            color: #333;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .player-name {
            flex: 1;
            font-weight: bold;
        }

        .ready-tag {
            margin-left: auto;
            color: #f9d71c;
            font-size: 0.85rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        input[type="text"] {
            width: 80%;
            padding: 12px 15px;
            border-radius: 20px;
            border: 2px solid #ddd;
            margin-bottom: 10px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #6a0dad;
            box-shadow: 0 0 0 3px rgba(106, 10, 173, 0.1);
        }

        input[type="text"]:disabled {
            background: #f0f0f0;
            color: #999;
            cursor: not-allowed;
        }

        .footer-input {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 15px 0;
            border-top: 2px solid #ddd;
            z-index: 10;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.1);
        }

        .typing-status {
            text-align: center;
            color: #6a0dad;
            font-weight: bold;
            padding: 50px 20px;
            font-size: 1.2rem;
        }

        .member-count {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            margin: 10px 15px 0;
        }

        .info-text {
            text-align: center;
            color: #666;
            padding: 10px 20px 8px;
            font-size: 0.95rem;
        }

        .status-banner {
            margin: 12px 15px 0;
            padding: 12px 15px;
            border-radius: 10px;
            background: #fff7c2;
            color: #6b5800;
            font-weight: bold;
            text-align: center;
            border-left: 4px solid #f9d71c;
        }

        .current-question {
            background: white;
            border: 3px solid #f9d71c;
            margin: 20px 15px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.3rem;
            color: #333;
            word-break: break-word;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-question {
            background: white;
            border: 3px solid #6a0dad;
            margin: 15px 15px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #6a0dad;
            word-break: break-word;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-question-label {
            font-size: 0.85rem;
            color: #999;
            display: block;
            margin-bottom: 8px;
            font-weight: normal;
        }

        .result-card {
            background: white;
            padding: 15px;
            margin: 10px 15px;
            border-radius: 10px;
            text-align: left;
            border-left: 5px solid #6a0dad;
            word-break: break-word;
        }

        .result-card b {
            color: #6a0abd;
            display: block;
            margin-bottom: 5px;
        }

        h2, h3 {
            margin-top: 0;
            color: #6a0dad;
        }

        .error-banner {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
            margin: 12px 15px 0;
            padding: 12px 15px;
            border-radius: 10px;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            .app-container {
                border-radius: 0;
            }

            button {
                width: 90%;
            }

            input[type="text"] {
                width: 90%;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header" id="header-text">全員一致ゲーム</div>
    
    <!-- 接続状態表示 -->
    <div id="connection-status" class="connection-status disconnected">
        <span class="connection-indicator"></span>
        <span id="status-text">サーバーに接続中...</span>
    </div>

    <!-- ロビー -->
    <div id="view-lobby" class="view">
        <div style="padding:60px 20px; text-align:center;">
            <h3>名前と部屋番号を入力してください</h3>
            <input type="text" id="input-name" placeholder="名前を入力" maxlength="20" autocomplete="name">
            <input type="text" id="input-room" placeholder="部屋番号を入力" maxlength="20" autocomplete="off">
            <button class="btn-yellow" id="join-btn" onclick="join()">部屋に入る</button>
        </div>
    </div>

    <!-- 待機ルーム -->
    <div id="view-wait-room" class="view hidden">
        <div style="padding:20px 15px; padding-bottom: 140px;">
            <p class="info-text">✋ メンバーを待っています...</p>
            <div class="member-count">
                <span id="member-count-text">0人参加中</span>
            </div>
            <div id="all-member-list" class="ready-list"></div>
            <button id="host-start-btn" class="btn-pink hidden" onclick="goToSetup()">ゲームを開始する</button>
            <button class="btn-exit" onclick="leaveRoom()">退出する</button>
        </div>
    </div>

    <!-- セットアップ画面 -->
    <div id="view-setup" class="view hidden">
        <div style="padding:40px 20px; text-align:center;">
            <h3>🎯 お題を決めてください</h3>
            <input type="text" id="input-manual-q" placeholder="例：赤い果物といえば？" maxlength="80">
            <button class="btn-pink" onclick="startGame()">送信！</button>
            <button class="btn-white" onclick="backToWaiting()">キャンセル</button>
        </div>
    </div>

    <!-- 入力中 -->
    <div id="view-typing" class="view hidden">
        <div class="typing-status">⏳ お題入力中...</div>
        <div id="typing-member-list" class="ready-list"></div>
    </div>

    <!-- ゲーム画面 -->
    <div id="view-game" class="view hidden">
        <div style="padding: 20px 15px; padding-bottom: 160px;">
            <div class="current-question" id="current-q">お題を待っています…</div>
            <div id="game-status" class="status-banner hidden"></div>
            <div id="game-ready-list" class="ready-list"></div>
        </div>
        <div class="footer-input">
            <div id="ans-area">
                <input type="text" id="input-ans" placeholder="答えを入力" maxlength="40" autocomplete="off">
                <button class="btn-yellow" id="submit-btn" onclick="submitAns()">送信</button>
            </div>
            <button id="open-btn" class="btn-pink hidden" onclick="openAll()">全員の回答を見る</button>
        </div>
    </div>

    <!-- 結果画面 -->
    <div id="view-result" class="view hidden" style="padding:20px; text-align:center; padding-bottom:140px;">
        <h2>🎉 結果発表</h2>
        <!-- ✅ お題を表示 -->
        <div id="result-question-container" class="result-question">
            <div>
                <span class="result-question-label">お題</span>
                <span id="result-question-text"></span>
            </div>
        </div>
        <!-- 判定結果 -->
        <div id="result-message" class="status-banner hidden"></div>
        <!-- 回答一覧 -->
        <div id="result-list"></div>
        <button id="next-btn" class="btn-yellow hidden" onclick="nextRound()">次のお題担当へ</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
