<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全員一致ゲーム</title>
    <link rel="stylesheet" href="style/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <h1>全員一致ゲーム</h1>
        <p class="subtitle">全員で同じ回答を目指そう！</p>
      </header>

      <section class="panel">
        <div class="row">
          <input id="playerName" type="text" placeholder="あなたの名前" maxlength="15" />
        </div>
        <div id="topicSection" class="row stacked-mobile">
          <input id="topicInput" type="text" placeholder="お題を入力（例：おにぎりの具といえば？）" />
          <button id="startRoundBtn">お題を出す</button>
        </div>
        <div class="topic-display">
          <h2 id="currentTopic">お題を待機中...</h2>
        </div>
      </section>

      <section class="panel">
        <div id="inputArea" class="row">
          <input id="myAnswer" type="text" placeholder="あなたの回答" />
          <button id="sendAnswerBtn">回答を送信</button>
        </div>
        <div id="answerStatus" class="status-grid">
          </div>
        <div class="actions">
          <button id="revealBtn" class="primary" disabled>全員の回答を公開！</button>
        </div>
      </section>

      <section id="resultArea" class="result-grid"></section>
    </main>
    <script src="app/app.js"></script>
  </body>
</html>
